# ============================================================
# Nginx config — serves the React SPA and proxies API calls
# to the two backend services inside the Docker network.
# ============================================================

server {
    listen 80;
    server_name _;

    # ---- Static SPA ----
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---- AuthService (login / JWT) → :8081 (internal) ----
    location /api/v1/auth/ {
        proxy_pass http://auth-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- CoreService (everything else) → :8082 (internal) ----
    location /api/ {
        proxy_pass http://core-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}