server:
  port: ${AUTH_SERVICE_PORT:8081}
  tomcat:
    threads:
      max: 100
      min-spare: 10
    connection-timeout: 20000
    uri-encoding: UTF-8
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 2048
  shutdown: graceful

spring:
  application:
    name: auth-service

  # ==================== PROFILES ====================
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ==================== DATABASE (AUTH SERVICE) ====================
  datasource:
    url: ${AUTH_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521:XE}
    driver-class-name: ${AUTH_DATASOURCE_DRIVER:oracle.jdbc.OracleDriver}
    username: ${AUTH_DATASOURCE_USERNAME:auth}
    password: ${AUTH_DATASOURCE_PASSWORD:auth123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: AuthHikariPool
      validation-timeout: 5000
      leak-detection-threshold: 60000

  # ==================== JPA ====================
  jpa:
    database: ${AUTH_JPA_DATABASE:ORACLE}
    hibernate:
      ddl-auto: ${AUTH_JPA_DDL_AUTO:update}
    show-sql: ${AUTH_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${AUTH_HIBERNATE_DIALECT:org.hibernate.dialect.OracleDialect}
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
    open-in-view: false

  # ==================== JACKSON ====================
  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC
    parser:
      allow-unquoted-field-names: false

  # ==================== TASK EXECUTION ====================
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 50
      thread-name-prefix: "auth-async-"

# ==================== JWT ====================
app:
  jwt:
    secret: "${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationWithHighSecurity1234567890!@#$%^&*()_+}"
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

# ==================== MANAGEMENT (ACTUATOR) ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      status:
        http-mapping:
          down: 503
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# ==================== SPRING DOCS (OpenAPI) ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
    show-extensions: true
    show-common-extensions: true
    try-it-out-enabled: true
  show-actuator: true
  packages-to-scan: hospital.authservice.controller
  paths-to-match: /api/v1/**
  writer-with-default-pretty-printer: true

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    hospital.authservice: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/auth-service.log