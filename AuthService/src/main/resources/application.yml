# ============================================================
# AuthService — Spring Boot Configuration
# ============================================================

spring:
  application:
    name: auth-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ==================== DATABASE ====================
  datasource:
    url: ${AUTH_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1522/XEPDB1}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${AUTH_DATASOURCE_USERNAME:auth}
    password: ${AUTH_DATASOURCE_PASSWORD:auth123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # ==================== JPA ====================
  jpa:
    database: ORACLE
    hibernate:
      ddl-auto: ${AUTH_JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  # ==================== JACKSON ====================
  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8081}

# ==================== JWT ====================
app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationWithHighSecurity1234567890!@#$%^&*()_+}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

# ==================== SPRING DOCS (OpenAPI/Swagger) ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
  packages-to-scan: hospital.authservice.controller
  paths-to-match: /api/v1/**

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    hospital.authservice: DEBUG
    org.springframework.security: INFO
