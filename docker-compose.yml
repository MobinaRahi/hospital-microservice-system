# ============================================================
# Hospital Microservice System — Docker Compose
#
#   docker compose up --build      → start everything
#   docker compose down            → stop everything
#
# URLs:
#   Frontend       → http://localhost:5373
#   AuthService    → http://localhost:8281
#   CoreService    → http://localhost:8382
#   ClinicalService → http://localhost:8383
#   Swagger (Auth) → http://localhost:8281/swagger-ui.html
#   Swagger (Core) → http://localhost:8382/swagger-ui.html
#   Swagger (Clin) → http://localhost:8383/swagger-ui.html
#
# Accounts:
#   admin / Admin@123
#   dr.ali / Doctor@123
#   patient.reza / Patient@123
# ============================================================

services:
  # ─────────────────────────────────────────────────────────doc
  # Oracle Database
  # ─────────────────────────────────────────────────────────
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: nova-oracle
    environment:
      ORACLE_PASSWORD: oracle123
      APP_USER: appuser
      APP_USER_PASSWORD: appuser123
    ports:
      - "1522:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/oracle-init.sql:/container-entrypoint-initdb.d/01-create-users.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 60s
    networks:
      - nova-net

  # ─────────────────────────────────────────────────────────
  # AuthService (host:8281 → container:8081)
  # ─────────────────────────────────────────────────────────
  auth-service:
    build: ./AuthService
    container_name: nova-auth
    environment:
      SERVER_PORT: 8081
      AUTH_DATASOURCE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      AUTH_DATASOURCE_USERNAME: auth
      AUTH_DATASOURCE_PASSWORD: auth123
      AUTH_JPA_DDL_AUTO: update
      JWT_SECRET: "mySuperSecretKeyForJWTTokenGenerationWithHighSecurity1234567890!@#$%^&*()_+"
    ports:
      - "8281:8081"
    depends_on:
      oracle-xe:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: on-failure
    networks:
      - nova-net

  # ─────────────────────────────────────────────────────────
  # CoreService (host:8382 → container:8082)
  # ─────────────────────────────────────────────────────────
  core-service:
    build: ./CoreService
    container_name: nova-core
    environment:
      SERVER_PORT: 8082
      CORE_DATASOURCE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      CORE_DATASOURCE_USERNAME: core
      CORE_DATASOURCE_PASSWORD: core123
      CORE_JPA_DDL_AUTO: update
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      JWT_SECRET: "mySuperSecretKeyForJWTTokenGenerationWithHighSecurity1234567890!@#$%^&*()_+"
    ports:
      - "8382:8082"
    depends_on:
      oracle-xe:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: on-failure
    networks:
      - nova-net

  # ─────────────────────────────────────────────────────────
  # ClinicalService (host:8383 → container:8083)
  # ─────────────────────────────────────────────────────────
  clinical-service:
    build: ./ClinicalService
    container_name: nova-clinical
    environment:
      SERVER_PORT: 8083
      CLINICAL_DATASOURCE_URL: jdbc:oracle:thin:@oracle-xe:1521/XEPDB1
      CLINICAL_DATASOURCE_USERNAME: clinical
      CLINICAL_DATASOURCE_PASSWORD: clinical123
      CLINICAL_JPA_DDL_AUTO: update
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      CORE_SERVICE_BASE_URL: http://core-service:8082
      JWT_SECRET: "mySuperSecretKeyForJWTTokenGenerationWithHighSecurity1234567890!@#$%^&*()_+"
    ports:
      - "8383:8083"
    depends_on:
      oracle-xe:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      core-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: on-failure
    networks:
      - nova-net

  # ─────────────────────────────────────────────────────────
  # React Frontend (host:5373 → container:80)
  # ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: nova-frontend
    ports:
      - "5373:80"
    depends_on:
      - auth-service
      - core-service
      - clinical-service
    networks:
      - nova-net

networks:
  nova-net:
    driver: bridge

volumes:
  oracle-data: