spring:
  application:
    name: core-service

  # ==================== PROFILES ====================
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ==================== SECURITY ====================
  security:
    filter:
      order: 0

  # ==================== DATABASE (CORE SERVICE) ====================
  datasource:
    url: ${CORE_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1522/XEPDB1}
    driver-class-name: ${CORE_DATASOURCE_DRIVER:oracle.jdbc.OracleDriver}
    username: ${CORE_DATASOURCE_USERNAME:core}
    password: ${CORE_DATASOURCE_PASSWORD:core123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: CoreHikariPool
      validation-timeout: 5000
      leak-detection-threshold: 60000

  # ==================== JPA ====================
  jpa:
    database: ${CORE_JPA_DATABASE:ORACLE}
    hibernate:
      ddl-auto: ${CORE_JPA_DDL_AUTO:update}
    show-sql: ${CORE_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${CORE_HIBERNATE_DIALECT:org.hibernate.dialect.OracleDialect}
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        hbm2ddl:
          extra_physical_table_types: VIEW
        schema_update:
          unique_constraint_strategy: RECREATE_QUIETLY
    open-in-view: false

  # ==================== THYMELEAF ====================
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html

  # ==================== WEB ====================
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true
      cache:
        period: 3600

  # ==================== ERROR HANDLING ====================
  mvc:
    log-resolved-exception: true

  # ==================== JACKSON ====================
  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC
    parser:
      allow-unquoted-field-names: false

  # ==================== TASK EXECUTION ====================
  task:
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: "core-async-"

# ==================== SERVER ====================
server:
  port: ${CORE_SERVICE_PORT:8082}
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-connections: 10000
    accept-count: 100
    uri-encoding: UTF-8
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 2048
  shutdown: graceful

# ==================== AUTH SERVICE CLIENT ====================
services:
  auth:
    base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}

# ==================== JWT ====================
app:
  jwt:
    secret: "${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationWithHighSecurity1234567890!@#$%^&*()_+}"
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

# ==================== MANAGEMENT (ACTUATOR) ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,httpexchanges,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      status:
        http-mapping:
          down: 503
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# ==================== SPRING DOCS (OpenAPI) ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
    show-extensions: true
    show-common-extensions: true
    try-it-out-enabled: true
  show-actuator: true
  packages-to-scan: hospital.coreservice.controller
  paths-to-match: /api/v1/**
  writer-with-default-pretty-printer: true

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    hospital.coreservice: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/core-service.log