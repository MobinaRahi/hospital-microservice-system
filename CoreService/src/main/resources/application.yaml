# ==================== SPRING DOCS (OpenAPI) ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
    show-extensions: true
    show-common-extensions: true
    try-it-out-enabled: true
  show-actuator: true
  packages-to-scan: com.company.springbootfullsample.controller
  paths-to-match: /api/v1/**
  writer-with-default-pretty-printer: true
