<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تکمیل پروفایل – بیمارستان نووا</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --teal: #2a9d8f;
            --teal-dark: #1e7268;
            --teal-light: #4db6a8;
            --teal-pale: #e8f5f3;
            --navy: #1e3040;
            --gray-100: #f7fafb;
            --gray-200: #eef3f5;
            --gray-400: #a0b4bc;
            --gray-600: #5a7585;
            --red: #ef4444;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --green: #16a34a;
            --green-pale: #dcfce7;
        }

        body {
            font-family: "Vazirmatn", Tahoma, sans-serif;
            background: linear-gradient(145deg, #f0f7f9 0%, #e6f0f2 100%);
            color: var(--navy);
            direction: rtl;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 40px 36px;
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 900;
            color: var(--navy);
        }

        .header h1 span {
            color: var(--teal);
        }

        .header p {
            color: var(--gray-600);
            font-size: 14px;
            margin-top: 8px;
        }

        .alert {
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 14px;
            display: none;
        }

        .alert.success {
            background: var(--green-pale);
            color: var(--green);
            border-right: 4px solid var(--green);
            display: block;
        }

        .alert.error {
            background: #fee2e2;
            color: var(--red);
            border-right: 4px solid var(--red);
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--navy);
        }

        .form-group label .req {
            color: var(--red);
            margin-right: 2px;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 15px;
            background: var(--gray-100);
            transition: all 0.2s;
            outline: none;
            color: var(--navy);
        }

        .form-group select:focus,
        .form-group input:focus {
            border-color: var(--teal);
            background: white;
            box-shadow: 0 0 0 4px rgba(42, 157, 143, 0.12);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 24px 18px;
            }
        }

        .actions {
            display: flex;
            gap: 14px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 2px solid var(--gray-200);
        }

        .btn-submit {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(42, 157, 143, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(42, 157, 143, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-cancel {
            padding: 14px 24px;
            background: transparent;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 14px;
            color: var(--gray-600);
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-cancel:hover {
            border-color: var(--gray-400);
            color: var(--navy);
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info-box {
            background: var(--gray-100);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 24px;
            border-right: 4px solid var(--teal);
        }

        .info-box strong {
            display: block;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .info-box span {
            font-size: 13px;
            color: var(--gray-600);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>تکمیل <span>پروفایل</span></h1>
        <p>لطفاً اطلاعات خود را کامل کنید تا بتوانید از تمام خدمات استفاده کنید</p>
    </div>

    <div class="info-box">
        <strong>👤 <span th:text="${patient.firstName + ' ' + patient.lastName}">کاربر</span></strong>
        <span>کد ملی: <span th:text="${patient.nationalId}">---</span> · شماره موبایل: <span
                th:text="${patient.phoneNumber}">---</span></span>
    </div>

    <div class="alert" id="alertMessage" th:classappend="${success} ? 'success' : 'error'">
        <span id="alertText" th:text="${message}"></span>
    </div>

    <form id="profileForm" th:action="@{/api/v1/patient/complete-registration}" method="post"
          onsubmit="submitForm(event)" autocomplete="off">
        <!-- patientId (از sessionStorage یا value از سرور) -->
        <input type="hidden" name="patientId" id="patientIdHidden" th:value="${patient != null ? patient.id : ''}"/>

        <div class="form-row">
            <div class="form-group">
                <label>نام <span class="req">*</span></label>
                <input type="text" name="firstName" th:value="${patient.firstName}" required/>
            </div>
            <div class="form-group">
                <label>نام خانوادگی <span class="req">*</span></label>
                <input type="text" name="lastName" th:value="${patient.lastName}" required/>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>جنسیت <span class="req">*</span></label>
                <select name="gender" required>
                    <option value="">انتخاب کنید</option>
                    <option value="MAN" th:selected="${patient.gender?.name() == 'MAN'}">مرد</option>
                    <option value="FEMALE" th:selected="${patient.gender?.name() == 'FEMALE'}">زن</option>
                    <option value="OTHER" th:selected="${patient.gender?.name() == 'OTHER'}">سایر</option>
                </select>
            </div>
            <div class="form-group">
                <label>گروه خونی <span class="req">*</span></label>
                <select name="bloodType" required>
                    <option value="">انتخاب کنید</option>
                    <option value="A_POSITIVE" th:selected="${patient.bloodType?.name() == 'A_POSITIVE'}">A+</option>
                    <option value="A_NEGATIVE" th:selected="${patient.bloodType?.name() == 'A_NEGATIVE'}">A-</option>
                    <option value="B_POSITIVE" th:selected="${patient.bloodType?.name() == 'B_POSITIVE'}">B+</option>
                    <option value="B_NEGATIVE" th:selected="${patient.bloodType?.name() == 'B_NEGATIVE'}">B-</option>
                    <option value="AB_POSITIVE" th:selected="${patient.bloodType?.name() == 'AB_POSITIVE'}">AB+</option>
                    <option value="AB_NEGATIVE" th:selected="${patient.bloodType?.name() == 'AB_NEGATIVE'}">AB-</option>
                    <option value="O_POSITIVE" th:selected="${patient.bloodType?.name() == 'O_POSITIVE'}">O+</option>
                    <option value="O_NEGATIVE" th:selected="${patient.bloodType?.name() == 'O_NEGATIVE'}">O-</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>آدرس <span class="req">*</span></label>
            <input type="text" name="address" th:value="${patient.address}" placeholder="آدرس کامل خود را وارد کنید"
                   required/>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>تاریخ تولد <span class="req">*</span></label>
                <input type="date" name="birthDate" th:value="${#temporals.format(patient.birthDate, 'yyyy-MM-dd')}"
                       required/>
            </div>
            <div class="form-group">
                <label>شماره تلفن</label>
                <input type="tel" name="phoneNumber" th:value="${patient.phoneNumber}" placeholder="۰۹۱۲۳۴۵۶۷۸۹"/>
            </div>
        </div>

        <div class="form-group">
            <label>حساسیت‌ها (اختیاری)</label>
            <input type="text" name="allergies" th:value="${patient.allergies}"
                   placeholder="مثلاً: پنی‌سیلین، گرده، ..."/>
        </div>

        <!-- نام کاربری و ایمیل -->
        <div class="form-row">
            <div class="form-group">
                <label>نام کاربری <span class="req">*</span></label>
                <input type="text" name="username"
                       th:value="${patient.username != null ? patient.username : patient.nationalId}"
                       placeholder="نام کاربری دلخواه را وارد کنید" autocomplete="new-username" required/>
                <small style="color: var(--gray-600); font-size: 12px; margin-top: 4px; display: block;">پیش‌فرض: کد ملی
                    شما</small>
            </div>
            <div class="form-group">
                <label>ایمیل <span class="req">*</span></label>
                <input type="email" name="email" th:value="${patient.email}" placeholder="example@email.com"
                       autocomplete="new-email" required/>
            </div>
        </div>

        <!-- رمز عبور جدید -->
        <div class="form-row">
            <div class="form-group">
                <label>رمز عبور جدید <span class="req">*</span></label>
                <input type="password" name="newPassword" placeholder="رمز عبور جدید را وارد کنید"
                       autocomplete="new-password" required/>
            </div>
            <div class="form-group">
                <label>تکرار رمز عبور <span class="req">*</span></label>
                <input type="password" name="confirmPassword" placeholder="تکرار رمز عبور" autocomplete="new-password"
                       required/>
            </div>
        </div>

        <div class="actions">
            <a th:href="@{/patient_dashboard}" class="btn-cancel">← بازگشت</a>
            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">ذخیره اطلاعات</span>
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // اگر patientId در hidden خالی بود، از sessionStorage بگیر
        const hiddenInput = document.getElementById('patientIdHidden');
        if (!hiddenInput.value) {
            const storedPatientId = sessionStorage.getItem('patientId');
            if (storedPatientId) {
                hiddenInput.value = storedPatientId;
            }
        }
    });

    function submitForm(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const alertEl = document.getElementById('alertMessage');
        const alertText = document.getElementById('alertText');

        // بررسی تطابق رمز عبور
        const password = document.querySelector('input[name="newPassword"]').value;
        const confirm = document.querySelector('input[name="confirmPassword"]').value;
        if (password !== confirm) {
            alertEl.className = 'alert error';
            alertText.textContent = 'رمز عبور و تکرار آن مطابقت ندارند';
            alertEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btnText.innerHTML = '<span class="loader"></span> در حال ذخیره...';

        const form = document.getElementById('profileForm');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);

        fetch('/api/v1/patient/complete-registration', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
                .then(res => {
                    // اگر پاسخ ۴۰۰ یا ۵۰۰ بود، خطا بگیریم
                    if (!res.ok) {
                        return res.json().then(errData => {
                            throw errData;
                        });
                    }
                    return res.json();
                })
                .then(response => {
                    if (response.success) {
                        alertEl.className = 'alert success';
                        alertText.textContent = '✅ ثبت‌نام با موفقیت کامل شد! لطفاً وارد شوید.';
                        alertEl.style.display = 'block';
                        sessionStorage.removeItem('patientId');
                        btn.disabled = false;
                        btnText.textContent = 'ذخیره اطلاعات';
                        setTimeout(() => {
                            window.location.href = '/login?registered=true';
                        }, 2500);
                    } else {
                        alertEl.className = 'alert error';
                        alertText.textContent = response.message || 'خطا در ذخیره اطلاعات';
                        alertEl.style.display = 'block';
                        btn.disabled = false;
                        btnText.textContent = 'ذخیره اطلاعات';
                    }
                })
                .catch(err => {
                    console.error(err);
                    alertEl.className = 'alert error';
                    alertText.textContent = err.message || 'خطا در ارتباط با سرور';
                    alertEl.style.display = 'block';
                    btn.disabled = false;
                    btnText.textContent = 'ذخیره اطلاعات';
                });
    }
</script>
</body>
</html>
