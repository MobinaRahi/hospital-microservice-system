<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داشبورد پرستار – بیمارستان فوق‌تخصصی نووا</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/panel.css}" href="../static/css/panel.css" />
</head>
<body>
  <div class="panel-shell">
    <nav class="panel-nav">
      <a class="panel-brand" href="/"><span class="panel-logo">+</span><span>بیمارستان نووا</span></a>
      <div class="panel-links">
  <a href="/">خانه</a><a href="/dashboard">داشبورد</a><a href="/doctors">پزشکان</a><a href="/appointments">نوبت‌ها</a><a href="/patients">بیماران</a><a href="/nurses">پرستاران</a><a href="/rooms">اتاق‌ها</a><a href="/shifts">شیفت‌ها</a><a href="/login">ورود</a>
</div>
    </nav>
    <header class="panel-hero">
      <div class="eyebrow">پنل پرستار</div>
      <h1>داشبورد پرستار</h1>
      <p class="panel-desc">نمای وظایف شیفت و بیماران تحت مراقبت.</p>
      <div class="actions"><a class="btn btn-primary" href="/appointments/book">رزرو نوبت</a><a class="btn btn-light" href="/dashboard">بازگشت به داشبورد</a></div>
    </header>
    <section class="section grid grid-3"><div class="card"><h2 class="section-title">وظایف باز</h2><div class="metric-value">۶</div></div><div class="card"><h2 class="section-title">بیماران تحت مراقبت</h2><div class="metric-value">۱۴</div></div><div class="card"><h2 class="section-title">تحویل شیفت</h2><div class="metric-value">۲۰:۰۰</div></div></section><section class="section"><div class="card"><h2 class="section-title">گزارش شیفت</h2><p class="empty-note">برای اتصال کامل، می‌توان API وظایف پرستاری اضافه کرد.</p></div></section>
  </div>
</body>
</html>
