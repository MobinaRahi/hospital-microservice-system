# ============================================================
# ClinicalService — Spring Boot Configuration
# ============================================================

spring:
  application:
    name: clinical-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ==================== DATABASE ====================
  datasource:
    url: ${CLINICAL_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521:XE}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${CLINICAL_DATASOURCE_USERNAME:clinical}
    password: ${CLINICAL_DATASOURCE_PASSWORD:clinical123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # ==================== JPA ====================
  jpa:
    database: ORACLE
    hibernate:
      ddl-auto: ${CLINICAL_JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  # ==================== JACKSON ====================
  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ==================== SERVER ====================
server:
  port: ${SERVER_PORT:8083}

# ==================== SERVICES ====================
services:
  auth:
    base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}
  core:
    base-url: ${CORE_SERVICE_BASE_URL:http://localhost:8082}

# ==================== JWT ====================
app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationWithHighSecurity1234567890!@#$%^&*()_+}

# ==================== SPRING DOCS ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: hospital.clinicalservice.controller
  paths-to-match: /api/v1/**

# ==================== LOGGING ====================
logging:
  level:
    root: INFO
    hospital.clinicalservice: DEBUG